data:
  data_dir: data
  num_workers: 4
model:
  dropout: 0.1
  hidden_dim: 128
  name: bilstm
  num_layers: 2
  use_attention: true
paths:
  checkpoint_dir: checkpoints/bilstm_fw1
  results_dir: results/bilstm_fw1
training:
  batch_size: 64
  epochs: 100
  grad_clip: 1.0
  loss_freq_weight: 1.0
  loss_l1_weight: 1.0
  lr: 0.0001
  patience: 10
  seed: 42
  weight_decay: 1.0e-05
