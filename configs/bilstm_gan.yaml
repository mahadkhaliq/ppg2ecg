model:
  name: bilstm_gan
  hidden_dim: 128
  num_layers: 2
  dropout: 0.1
  use_attention: true

training:
  batch_size: 64
  epochs: 100
  lr: 1.0e-4
  weight_decay: 1.0e-5
  patience: 10
  loss_l1_weight: 1.0
  loss_freq_weight: 0.5
  lambda_adv: 0.1
  n_filters: 32
  d_update_interval: 1
  grad_clip: 1.0
  seed: 42

data:
  data_dir: data
  num_workers: 4

paths:
  checkpoint_dir: checkpoints/bilstm_gan
  results_dir: results/bilstm_gan
